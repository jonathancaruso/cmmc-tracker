<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup | CMMC Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-primary); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .setup-card { background: var(--bg-secondary); border-radius: 0.75rem; padding: 2.5rem; width: 100%; max-width: 440px; margin: 1rem; }
        .setup-card h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .setup-card .subtitle { color: var(--text-muted); font-size: 0.875rem; margin-bottom: 1.5rem; line-height: 1.5; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; color: var(--text-muted); font-size: 0.8rem; font-weight: 600; margin-bottom: 0.35rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .form-group input { width: 100%; background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary); padding: 0.6rem 0.75rem; border-radius: 0.375rem; font-size: 0.95rem; }
        .form-group input:focus { border-color: var(--accent); outline: none; }
        .submit-btn { width: 100%; background: var(--accent); color: var(--bg-primary); border: none; padding: 0.7rem; border-radius: 0.375rem; font-size: 0.95rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; }
        .submit-btn:hover { opacity: 0.9; }
        .error { background: var(--danger-bg); color: var(--danger-text); padding: 0.6rem 0.75rem; border-radius: 0.375rem; font-size: 0.85rem; margin-bottom: 1rem; }
        .error ul { margin: 0.25rem 0 0 1.25rem; }
        .error li { margin-bottom: 0.15rem; }
        .pw-policy { color: var(--text-dim); font-size: 0.75rem; margin-top: 0.35rem; line-height: 1.5; }
        .theme-bar { position: fixed; top: 1rem; right: 1rem; }
    </style>
{% include "theme.html" %}
</head>
<body>
    <div class="theme-bar">
        <span class="font-controls"><button class="font-btn" onclick="changeFont(-10)" title="Smaller">A-</button><button class="font-btn" onclick="changeFont(10)" title="Larger">A+</button></span>
        <button class="theme-toggle" onclick="toggleTheme()">&#9728;&#65039;</button>
    </div>
    <div class="setup-card">
        <h1>CMMC Artifact Tracker</h1>
        <div class="subtitle">No accounts exist yet. Create the first admin account to get started.</div>
        {% if errors %}
        <div class="error">
            <ul>
            {% for e in errors %}
                <li>{{ e }}</li>
            {% endfor %}
            </ul>
        </div>
        {% endif %}
        <form method="POST" action="/setup">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" value="{{ username }}" required autofocus autocomplete="username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required autocomplete="new-password">
                <div class="pw-policy">Min 16 characters. Must include uppercase, lowercase, number, and special character.</div>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" required autocomplete="new-password">
            </div>
            <button type="submit" class="submit-btn">Create Admin Account</button>
        </form>
    </div>
</body>
</html>
