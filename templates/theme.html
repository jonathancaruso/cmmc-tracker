<style>
    :root {
        --bg-primary: #0f172a;
        --bg-secondary: #1e293b;
        --bg-tertiary: #162032;
        --bg-hover: #253348;
        --bg-card: #1e293b;
        --bg-input: #1e293b;
        --bg-deep: #0c1425;
        --border: #334155;
        --border-light: #475569;
        --text-primary: #e2e8f0;
        --text-secondary: #cbd5e1;
        --text-muted: #94a3b8;
        --text-dim: #64748b;
        --link: #38bdf8;
        --link-hover: #7dd3fc;
        --accent: #38bdf8;
        --success-bg: #064e3b;
        --success-text: #34d399;
        --warning-bg: #422006;
        --warning-text: #f59e0b;
        --danger-bg: #7f1d1d;
        --danger-text: #fca5a5;
        --purple-bg: #3b1f5e;
        --purple-text: #a78bfa;
    }

    [data-theme="light"] {
        --bg-primary: #f8fafc;
        --bg-secondary: #ffffff;
        --bg-tertiary: #f1f5f9;
        --bg-hover: #e2e8f0;
        --bg-card: #ffffff;
        --bg-input: #ffffff;
        --bg-deep: #f8fafc;
        --border: #e2e8f0;
        --border-light: #cbd5e1;
        --text-primary: #1e293b;
        --text-secondary: #334155;
        --text-muted: #64748b;
        --text-dim: #94a3b8;
        --link: #2563eb;
        --link-hover: #1d4ed8;
        --accent: #2563eb;
        --success-bg: #dcfce7;
        --success-text: #166534;
        --warning-bg: #fef3c7;
        --warning-text: #92400e;
        --danger-bg: #fee2e2;
        --danger-text: #991b1b;
        --purple-bg: #ede9fe;
        --purple-text: #6d28d9;
    }

    .theme-toggle, .font-btn { background: none; border: 1px solid var(--border-light); color: var(--text-muted); cursor: pointer; padding: 0.35rem 0.5rem; border-radius: 0.375rem; font-size: 0.85rem; line-height: 1; }
    .theme-toggle:hover, .font-btn:hover { color: var(--text-primary); border-color: var(--text-dim); }
    .font-controls { display: inline-flex; gap: 0.2rem; }
</style>
<meta name="csrf-token" content="{{ csrf_token() }}">
<script>
// --- CSRF + XSS helpers ---
const _csrfToken = document.querySelector('meta[name="csrf-token"]')?.content || '';
const _csrfHeaders = {'X-CSRF-Token': _csrfToken};
function _fetchJson(url, opts = {}) {
    opts.headers = Object.assign({}, opts.headers || {}, _csrfHeaders);
    if (opts.body && typeof opts.body === 'string') {
        opts.headers['Content-Type'] = opts.headers['Content-Type'] || 'application/json';
    }
    return fetch(url, opts);
}
function _fetchForm(url, formData) {
    formData.append('csrf_token', _csrfToken);
    return fetch(url, { method: 'POST', body: formData });
}
function escapeHtml(str) {
    if (str == null) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
(function() {
    const saved = localStorage.getItem('cmmc-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
    document.body.setAttribute('data-theme', saved);
    const zoom = parseInt(localStorage.getItem('cmmc-zoom') || '100');
    document.documentElement.style.fontSize = zoom + '%';
})();
function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme') || 'dark';
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    document.body.setAttribute('data-theme', next);
    localStorage.setItem('cmmc-theme', next);
    document.querySelector('.theme-toggle').textContent = next === 'dark' ? '☀️' : '🌙';
}
function changeFont(delta) {
    let zoom = parseInt(localStorage.getItem('cmmc-zoom') || '100');
    zoom = Math.max(60, Math.min(150, zoom + delta));
    localStorage.setItem('cmmc-zoom', zoom);
    document.documentElement.style.fontSize = zoom + '%';
}
document.addEventListener('DOMContentLoaded', () => {
    const theme = localStorage.getItem('cmmc-theme') || 'dark';
    const btn = document.querySelector('.theme-toggle');
    if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
});
</script>
